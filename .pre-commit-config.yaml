repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix .
        language: system
        always_run: true
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format .
        language: system
        always_run: true
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        always_run: true
        pass_filenames: false
